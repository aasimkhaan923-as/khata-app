<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Daily Budget Pro</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; }
        .login-box { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input[type="password"] { width: 80%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 18px; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- سیکیورٹی اسکرین -->
    <div id="loginScreen" class="login-box">
        <h3>ایپ کو ان لاک کریں 🔒</h3>
        <input type="password" id="pinInput" placeholder="پن درج کریں" maxlength="4">
        <br>
        <button onclick="verifyPin()" style="padding: 10px 30px; background: #28a745; color: white; border: none; border-radius: 5px;">ان لاک کریں</button>
    </div>

    <!-- اصل ایپ کا کنٹینر -->
    <div id="mainApp" class="hidden">
        <h2>حساب کتاب 5.0</h2>
        <!-- یہاں باقی ڈیزائن (حصہ 2، 3، 4) آئے گا -->
    </div>

    <script>
        function verifyPin() {
            const pin = document.getElementById("pinInput").value;
            if(pin === "2917") {
                document.getElementById("loginScreen").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
            } else {
                alert("غلط پن کوڈ!");
            }
        }
    </script>
</body>
</html>
<!-- حصہ 2: ڈیش بورڈ -->
<div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
    <div class="card" style="background: white; padding: 15px; border-radius: 10px; text-align: center;"><h5>ٹوٹل خرچہ</h5><h3 id="exp">Rs 0</h3></div>
    <div class="card" style="background: white; padding: 15px; border-radius: 10px; text-align: center;"><h5>ٹوٹل آمدنی</h5><h3 id="inc">Rs 0</h3></div>
    <div class="card" style="background: white; padding: 15px; border-radius: 10px; text-align: center;"><h5>کیش (جیب)</h5><h3 id="cash">Rs 0</h3></div>
    <div class="card" style="background: white; padding: 15px; border-radius: 10px; text-align: center;"><h5>بینک / ایزی پیسہ</h5><h3 id="bank">Rs 0</h3></div>
</div>
<!-- حصہ 3: ان پٹ فارم -->
<div class="card" style="background: white; padding: 15px; border-radius: 10px; margin-top: 20px;">
    <input type="date" id="date" style="width: 100%; padding: 10px; margin: 5px 0;">
    
    <select id="category" style="width: 100%; padding: 10px; margin: 5px 0;">
        <option value="ration">راشن</option>
        <option value="medicine">دوائی</option>
        <option value="petrol">پٹرول</option>
        <option value="other">دیگر</option>
    </select>

    <input type="number" id="amount" placeholder="رقم درج کریں (روپے)" style="width: 100%; padding: 10px; margin: 5px 0;">
    <input type="text" id="desc" placeholder="تفصیل لکھیں..." style="width: 100%; padding: 10px; margin: 5px 0;">

    <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn-green" onclick="saveData('income')" style="padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px;">آمدنی</button>
        <button class="btn-red" onclick="saveData('expense')" style="padding: 10px; background: #dc3545; color: white; border: none; border-radius: 5px;">خرچہ</button>
    </div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBHpBbHUqTR-q1MdxJEzguJIkuixkxVLBI",
        authDomain: "hisaabkitaab-13d52.firebaseapp.com",
        projectId: "hisaabkitaab-13d52",
        storageBucket: "hisaabkitaab-13d52.firebasestorage.app",
        messagingSenderId: "194563862363",
        appId: "1:194563862363:web:536f2deae7dda9358cf47e",
        measurementId: "G-Y07XTW1ZH2"
    };
    const db = getFirestore(initializeApp(firebaseConfig));
    const GROUP = "bros_group_01"; // آپ تینوں بھائیوں کی آئی ڈی

    window.saveData = async (type) => {
        const amt = document.getElementById('amount').value;
        const desc = document.getElementById('desc').value;
        const cat = document.getElementById('category').value;
        const date = document.getElementById('date').value;

        await addDoc(collection(db, "hisaab_data"), {
            amount: Number(amt), type: type, desc: desc, category: cat, date: date, groupId: GROUP
        });
        alert("ڈیٹا محفوظ ہو گیا!");
        loadData();
    };

    window.loadData = async () => {
        const q = query(collection(db, "hisaab_data"), where("groupId", "==", GROUP));
        const snap = await getDocs(q);
        let inc = 0, exp = 0;
        snap.forEach(d => {
            let data = d.data();
            if(data.type == 'income') inc += data.amount; else exp += data.amount;
        });
        document.getElementById('inc').innerText = "Rs " + inc;
        document.getElementById('exp').innerText = "Rs " + exp;
    };
</script>
