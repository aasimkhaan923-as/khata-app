<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisaab Kitaab Pro</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; }
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; }
        .btn-green { background: #28a745; color: white; border: none; }
        .btn-red { background: #dc3545; color: white; border: none; }
    </style>
</head>
<body>
    <div id="login" class="card" style="text-align:center;">
        <h3>پن کوڈ درج کریں</h3>
        <input type="password" id="pinInput" placeholder="پن درج کریں...">
        <button onclick="checkPin()">ان لاک کریں</button>
    </div>

    <div id="app" style="display:none;">
        <h2 style="text-align:center;">حساب کتاب 5.0</h2>
        <div class="card"><h3 id="totalDisplay">ٹوٹل: 0 روپے</h3></div>
        <div class="card">
            <input type="number" id="amount" placeholder="رقم">
            <input type="text" id="desc" placeholder="تفصیل">
            <button class="btn-green" onclick="saveData('income')">آمدنی</button>
            <button class="btn-red" onclick="saveData('expense')">خرچہ</button>
        </div>
        <div id="list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBHpBbHUqTR-q1MdxJEzguJIkuixkxVLBI",
            authDomain: "hisaabkitaab-13d52.firebaseapp.com",
            projectId: "hisaabkitaab-13d52",
            storageBucket: "hisaabkitaab-13d52.firebasestorage.app",
            messagingSenderId: "194563862363",
            appId: "1:194563862363:web:536f2deae7dda9358cf47e",
            measurementId: "G-Y07XTW1ZH2"
        };
        const db = getFirestore(initializeApp(firebaseConfig));
        const GROUP = "bros_group_01";

        window.checkPin = () => {
            if(document.getElementById('pinInput').value == "2917") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                loadData();
            } else { alert("غلط پن!"); }
        };

        window.saveData = async (type) => {
            await addDoc(collection(db, "hisaab_data"), {
                amount: parseInt(document.getElementById('amount').value),
                desc: document.getElementById('desc').value,
                type: type, groupId: GROUP
            });
            loadData();
        };

        window.loadData = async () => {
            const q = query(collection(db, "hisaab_data"), where("groupId", "==", GROUP));
            const snap = await getDocs(q);
            let t = 0; let html = "";
            snap.forEach(d => {
                let data = d.data();
                t += (data.type == 'income' ? data.amount : -data.amount);
                html += `<div class='card'>${data.desc}: ${data.amount} روپے</div>`;
            });
            document.getElementById('totalDisplay').innerText = "ٹوٹل: " + t + " روپے";
            document.getElementById('list').innerHTML = html;
        };
    </script>
</body>
</html>
