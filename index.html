<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Budget Pro 3.0</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBHpBbHUqTR-q1MdxJEzguJIkuixkxVLBI",
            authDomain: "hisaabkitaab-13d52.firebaseapp.com",
            projectId: "hisaabkitaab-13d52",
            storageBucket: "hisaabkitaab-13d52.firebasestorage.app",
            messagingSenderId: "194563862363",
            appId: "1:194563862363:web:536f2deae7dda9358cf47e",
            measurementId: "G-Y07XTW1ZH2"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.GROUP_ID = "bros_group_01";
    </script>
    <style>
        body { font-family: Tahoma, sans-serif; background: #f4f7f6; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-green { background: #00c853; color: white; border: none; }
        .btn-red { background: #ff5252; color: white; border: none; }
    </style>
</head>
<body>
    <h2 style="text-align: center;">حساب کتاب ورژن 5.0 پرو 🚀</h2>
    <div class="grid">
        <div class="card"><h5>ٹوٹل خرچہ</h5><h3 id="totalExpense">Rs 0</h3></div>
        <div class="card"><h5>ٹوٹل آمدنی</h5><h3 id="totalIncome">Rs 0</h3></div>
        <div class="card"><h5>کیش (جیب)</h5><h3 id="cashBalance">Rs 0</h3></div>
        <div class="card"><h5>بینک / ایزی پیسہ</h5><h3 id="bankBalance">Rs 0</h3></div>
    </div>
        <div class="card" style="margin-top: 20px;">
        <input type="date" id="date">
        <select id="account"><option value="cash">کیش (جیب)</option><option value="bank">بینک / ایزی پیسہ</option></select>
        <input type="number" id="amount" placeholder="رقم درج کریں (روپے)">
        <input type="text" id="desc" placeholder="تفصیل...">
        <div class="grid">
            <button class="btn-green" onclick="addData('income')">آمدنی</button>
            <button class="btn-red" onclick="addData('expense')">خرچہ</button>
        </div>
        </div>
            <script type="module">
        import { collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        
        window.addData = async (type) => {
            const amount = document.getElementById("amount").value;
            await addDoc(collection(window.db, "hisaab_data"), {
                amount: parseInt(amount),
                type: type,
                account: document.getElementById("account").value,
                desc: document.getElementById("desc").value,
                date: document.getElementById("date").value,
                groupId: window.GROUP_ID
            });
            alert("ڈیٹا محفوظ ہو گیا!");
            loadData();
        };

        window.loadData = async () => {
            const q = query(collection(window.db, "hisaab_data"), where("groupId", "==", window.GROUP_ID));
            const querySnapshot = await getDocs(q);
            let totalEx = 0, totalInc = 0;
            querySnapshot.forEach((doc) => {
                const d = doc.data();
                if(d.type === 'expense') totalEx += d.amount;
                else totalInc += d.amount;
            });
            document.getElementById("totalExpense").innerText = "Rs " + totalEx;
            document.getElementById("totalIncome").innerText = "Rs " + totalInc;
        };
        loadData();
    </script>
</body>
</html>
